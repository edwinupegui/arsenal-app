<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arsenal-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D2C1B6"/>
      <stop offset="100%" stop-color="#B8A799"/>
    </linearGradient>
    <linearGradient id="arsenal-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D2C1B6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D2C1B6" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background circle with subtle warm glow -->
  <circle cx="60" cy="60" r="56" fill="#1B3C53"/>
  <circle cx="60" cy="60" r="56" fill="url(#arsenal-glow)" opacity="0.4"/>

  <!-- Outer ring - slate blue -->
  <circle cx="60" cy="60" r="54" stroke="#456882" stroke-width="1.5" fill="none"/>

  <!-- Arsenal "A" mark - warm sand -->
