  <rect x="86" y="48" width="10" height="3" rx="1" fill="#D2C1B6" opacity="0.5"/>
  <rect x="24" y="58" width="10" height="3" rx="1" fill="#D2C1B6" opacity="0.35"/>
  <rect x="86" y="58" width="10" height="3" rx="1" fill="#D2C1B6" opacity="0.35"/>
  <rect x="24" y="68" width="10" height="3" rx="1" fill="#D2C1B6" opacity="0.2"/>
  <rect x="86" y="68" width="10" height="3" rx="1" fill="#D2C1B6" opacity="0.2"/>
</svg>
